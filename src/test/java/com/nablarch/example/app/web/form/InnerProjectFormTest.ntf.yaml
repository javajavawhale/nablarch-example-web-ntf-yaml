testBeanValidation:
  LIST_MAP=testShots: #ListMap
    - "[No]": "1"
      title: "正常系-1"
      case: "開始日より終了日が後の日付である場合"
      expectedMessageId1: ""
      propertyName1: "validProjectPeriod"
    - "[No]": "2"
      title: "正常系-2"
      case: "開始日が空の場合"
      expectedMessageId1: ""
      propertyName1: "validProjectPeriod"
    - "[No]": "3"
      title: "正常系-3"
      case: "終了日が空の場合"
      expectedMessageId1: ""
      propertyName1: "validProjectPeriod"
    - "[No]": "4"
      title: "正常系-4"
      case: "開始日・終了日とも空の場合"
      expectedMessageId1: ""
      propertyName1: "validProjectPeriod"
    - "[No]": "5"
      title: "異常系-1"
      case: "開始日に終了日より後の日付が設定されていた場合"
      expectedMessageId1: "{com.nablarch.example.app.entity.core.validation.validator.DateRangeValidator.message}"
      propertyName1: "validProjectPeriod"

  LIST_MAP=params: #ListMap
    - "[No]": "1"
      projectId: "${半角数字, 9}"
      projectType: "development"
      projectName: "サンプルプロジェクト"
      projectStartDate: "20230817"
      projectEndDate: "20230818"
    - "[No]": "2"
      projectId: "${半角数字, 9}"
      projectType: "development"
      projectName: "サンプルプロジェクト"
      projectStartDate: "20230817"
      projectEndDate: ""
    - "[No]": "3"
